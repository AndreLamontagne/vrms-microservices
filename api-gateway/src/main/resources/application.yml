spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: cars-service
              uri: ${CARS_SERVICE_ROUTE_URI:http://localhost:8081}
              predicates:
                - Path=/api/cars,/api/cars/**
            - id: owners-service
              uri: ${OWNERS_SERVICE_ROUTE_URI:http://localhost:8082}
              predicates:
                - Path=/api/owners,/api/owners/**
            - id: agents-service
              uri: ${AGENTS_SERVICE_ROUTE_URI:http://localhost:8083}
              predicates:
                - Path=/api/agents,/api/agents/**
            - id: registration-service
              uri: ${REGISTRATION_SERVICE_ROUTE_URI:http://localhost:8084}
              predicates:
                - Path=/api/registrations,/api/registrations/**

server:
  port: 8080

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: cars-service
        url: http://localhost:8081/v3/api-docs
      - name: owners-service
        url: http://localhost:8082/v3/api-docs
      - name: agents-service
        url: http://localhost:8083/v3/api-docs
      - name: registration-service
        url: http://localhost:8084/v3/api-docs
