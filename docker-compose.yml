services:
  cars-db:
    image: postgres:16
    container_name: cars-db
    environment:
      POSTGRES_DB: cars_db
      POSTGRES_USER: vrms
      POSTGRES_PASSWORD: vrms
    ports:
      - "5433:5432"
    volumes:
      - cars_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vrms -d cars_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  owners-db:
    image: postgres:16
    container_name: owners-db
    environment:
      POSTGRES_DB: owners_db
      POSTGRES_USER: vrms
      POSTGRES_PASSWORD: vrms
    ports:
      - "5434:5432"
    volumes:
      - owners_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vrms -d owners_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  agents-db:
    image: postgres:16
    container_name: agents-db
    environment:
      POSTGRES_DB: agents_db
      POSTGRES_USER: vrms
      POSTGRES_PASSWORD: vrms
    ports:
      - "5435:5432"
    volumes:
      - agents_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vrms -d agents_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  registration-db:
    image: postgres:16
    container_name: registration-db
    environment:
      POSTGRES_DB: registration_db
      POSTGRES_USER: vrms
      POSTGRES_PASSWORD: vrms
    ports:
      - "5436:5432"
    volumes:
      - registration_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vrms -d registration_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  cars-service:
    build:
      context: ./cars-service
    container_name: cars-service
    environment:
      SPRING_PROFILES_ACTIVE: "pg"
      POSTGRES_HOST: cars-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: cars_db
      POSTGRES_USER: vrms
      POSTGRES_PASSWORD: vrms
      SERVER_PORT: 8080
    depends_on:
      cars-db:
        condition: service_healthy
    ports:
      - "8081:8080"

  owners-service:
    build:
      context: ./owners-service
    container_name: owners-service
    environment:
      SPRING_PROFILES_ACTIVE: "pg"
      POSTGRES_HOST: owners-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: owners_db
      POSTGRES_USER: vrms
      POSTGRES_PASSWORD: vrms
      SERVER_PORT: 8080
    depends_on:
      owners-db:
        condition: service_healthy
    ports:
      - "8082:8080"

  agents-service:
    build:
      context: ./agents-service
    container_name: agents-service
    environment:
      SPRING_PROFILES_ACTIVE: "pg"
      POSTGRES_HOST: agents-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: agents_db
      POSTGRES_USER: vrms
      POSTGRES_PASSWORD: vrms
      SERVER_PORT: 8080
    depends_on:
      agents-db:
        condition: service_healthy
    ports:
      - "8083:8080"

  registration-service:
    build:
      context: ./registration-service
    container_name: registration-service
    environment:
      SPRING_PROFILES_ACTIVE: "pg,docker"
      POSTGRES_HOST: registration-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: registration_db
      POSTGRES_USER: vrms
      POSTGRES_PASSWORD: vrms
      SERVER_PORT: 8080
      CARS_SERVICE_URL: http://cars-service:8080
      OWNERS_SERVICE_URL: http://owners-service:8080
      AGENTS_SERVICE_URL: http://agents-service:8080
    depends_on:
      registration-db:
        condition: service_healthy
      cars-service:
        condition: service_started
      owners-service:
        condition: service_started
      agents-service:
        condition: service_started
    ports:
      - "8084:8080"

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: "docker"
      SERVER_PORT: 8080
      CARS_SERVICE_ROUTE_URI: http://cars-service:8080
      OWNERS_SERVICE_ROUTE_URI: http://owners-service:8080
      AGENTS_SERVICE_ROUTE_URI: http://agents-service:8080
      REGISTRATION_SERVICE_ROUTE_URI: http://registration-service:8080
    depends_on:
      cars-service:
        condition: service_started
      owners-service:
        condition: service_started
      agents-service:
        condition: service_started
      registration-service:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  cars_pg_data:
  owners_pg_data:
  agents_pg_data:
  registration_pg_data:
